---
- name: Initialize Vault Secrets
  hosts: hangar
  become: false

  vars:
    hangar_dir: "{{ ansible_env.HOME }}/documents/hangar"
    # These can be overridden via group_vars or --extra-vars
    nomad_addr: "http://127.0.0.1:4646"
    consul_addr: "http://127.0.0.1:8500"

  tasks:

    # ── Load root token ──────────────────────────────────────────────────────

    - name: Read Vault init data
      become: true
      slurp:
        src: /etc/vault.d/keys/init.json
      register: vault_init_raw

    - name: Set root token fact
      set_fact:
        vault_root_token: "{{ (vault_init_raw.content | b64decode | from_json).root_token }}"
      no_log: true

    # ── Wait for Vault to be unsealed ────────────────────────────────────────

    - name: Wait for Vault to be unsealed
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          vault status -format=json | jq -e '.sealed == false' > /dev/null
      register: vault_unsealed
      retries: 10
      delay: 5
      until: vault_unsealed.rc == 0
      changed_when: false

    # ── KV secrets engine ────────────────────────────────────────────────────

    - name: Check if KV secrets engine is already enabled
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault secrets list -format=json | jq -e '."hangar/"' > /dev/null 2>&1 \
          && echo "ok" || echo "missing"
      register: kv_check
      changed_when: false
      no_log: true

    - name: Enable KV v2 secrets engine at hangar/
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault secrets enable -path=hangar kv-v2
      when: kv_check.stdout == "missing"
      no_log: true

    # ── Seed hangar/config ───────────────────────────────────────────────────

    - name: Load Nomad bootstrap token
      become: true
      shell: cat /etc/nomad.d/bootstrap.json | jq -r '.SecretID'
      register: nomad_token
      changed_when: false
      no_log: true

    - name: Seed hangar/config secret
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault kv put hangar/config \
            nomad_addr="{{ nomad_addr }}" \
            consul_addr="{{ consul_addr }}" \
            nomad_token="{{ nomad_token.stdout }}"
      changed_when: false
      no_log: true

    # ── Nomad workload identity JWT auth ─────────────────────────────────────

    - name: Check if JWT auth is already enabled
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault auth list -format=json | jq -e '."jwt-nomad/"' > /dev/null 2>&1 \
          && echo "ok" || echo "missing"
      register: jwt_auth_check
      changed_when: false
      no_log: true

    - name: Enable Vault JWT auth at jwt-nomad
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault auth enable -path=jwt-nomad jwt
      when: jwt_auth_check.stdout == "missing"
      no_log: true

    - name: Configure Nomad JWT auth method
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault write auth/jwt-nomad/config \
            jwks_url="http://127.0.0.1:4646/.well-known/jwks.json" \
            jwt_supported_algs="RS256,EdDSA" \
            default_role="nomad-workloads"
      changed_when: false
      no_log: true

    - name: Create Vault policy for Nomad workloads
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault policy write nomad-workloads - <<'EOF'
        path "hangar/data/*" {
          capabilities = ["read"]
        }
        path "hangar/data/deployments/*" {
          capabilities = ["create", "update", "read", "delete"]
        }
        EOF
      changed_when: false
      no_log: true

    - name: Create Nomad JWT auth role
      shell: |
        VAULT_ADDR=https://127.0.0.1:8200 VAULT_SKIP_VERIFY=true \
          VAULT_TOKEN={{ vault_root_token }} \
          vault write auth/jwt-nomad/role/nomad-workloads \
            role_type="jwt" \
            bound_audiences="vault.io" \
            user_claim="/nomad_job_id" \
            user_claim_json_pointer=true \
            claim_mappings="/nomad_job_id=nomad_job_id" \
            claim_mappings="/nomad_task=nomad_task" \
            token_policies="nomad-workloads" \
            token_period="1h" \
            token_type="service"
      changed_when: false
      no_log: true

    # ── Done ─────────────────────────────────────────────────────────────────

    - name: Confirm vault-init complete
      debug:
        msg:
          - "✅ KV engine enabled at hangar/"
          - "✅ hangar/config seeded"
          - "✅ JWT auth configured at jwt-nomad"
          - "✅ nomad-workloads policy + role created"
          - "✅ Vault ready for Nomad workload identity"
