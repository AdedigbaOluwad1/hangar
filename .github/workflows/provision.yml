name: Provision Server

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Provisioning mode"
        required: true
        default: "existing"
        type: choice
        options:
          - existing
          - terraform

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Setup Terraform
        if: inputs.mode == 'terraform'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: inputs.mode == 'terraform'
        run: terraform init
        working-directory: terraform
        env:
          TF_VAR_hetzner_token: ${{ secrets.HETZNER_TOKEN }}

      - name: Terraform Apply
        if: inputs.mode == 'terraform'
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_hetzner_token: ${{ secrets.HETZNER_TOKEN }}
          TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}

      - name: Get server IP from Terraform
        if: inputs.mode == 'terraform'
        id: terraform_output
        run: echo "server_ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Wait for SSH
        if: inputs.mode == 'terraform'
        run: |
          echo "⏳ Waiting for SSH on ${{ steps.terraform_output.outputs.server_ip }}..."
          until ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@${{ steps.terraform_output.outputs.server_ip }} "echo ready" 2>/dev/null; do
            sleep 5
          done

      - name: Write Ansible Vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault-pass

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Update inventory — existing server
        if: inputs.mode == 'existing'
        run: |
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          sed -i "s/YOUR_SERVER_IP/${{ secrets.SERVER_HOST }}/" ansible/inventory.ini
          sed -i "s/YOUR_SERVER_USER/${{ secrets.SERVER_USER }}/" ansible/inventory.ini

      - name: Update inventory — terraform server
        if: inputs.mode == 'terraform'
        run: |
          SERVER_IP=${{ steps.terraform_output.outputs.server_ip }}
          ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
          sed -i "s/YOUR_SERVER_IP/$SERVER_IP/" ansible/inventory.ini
          sed -i "s/YOUR_SERVER_USER/root/" ansible/inventory.ini

      - name: Run setup.yml
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbooks/setup.yml \
            --vault-password-file .vault-pass \
            --limit hangar_remote

      - name: Run deploy.yml
        env:
          HANGAR_REPO_URL: ${{ secrets.HANGAR_REPO_URL }}
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbooks/deploy.yml \
            --vault-password-file .vault-pass \
            --limit hangar_remote

      - name: Run vault-init.yml
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbooks/vault-init.yml \
            --vault-password-file .vault-pass \
            --limit hangar_remote

      - name: Cleanup
        if: always()
        run: rm -f .vault-pass ~/.ssh/id_rsa
